# ==========================================
# 网络配置
# ==========================================
networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ==========================================
# 数据卷配置
# ==========================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
