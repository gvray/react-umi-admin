# ==========================================
# Docker Compose 配置文件
# 用于本地开发和测试环境
# ==========================================

version: '3.8'

services:
  # ==========================================
  # 前端应用服务
  # ==========================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    image: react-umi-admin:latest
    container_name: react-umi-admin-web
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - TZ=Asia/Shanghai
      - NODE_ENV=production
    volumes:
      # 挂载日志目录
      - ./logs/nginx:/var/log/nginx
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      - "com.example.description=React UMI Admin Frontend"
      - "com.example.version=1.0.0"

  # ==========================================
  # 后端 API 服务（示例）
  # ==========================================
